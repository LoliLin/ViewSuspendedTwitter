<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Twitter Snapshot Reader</title>
    <style>
        :root {
            --primary-color: #1d9bf0;
            --bg-color: #f7f9f9;
            --border-color: #eff3f4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }
        /* 左侧列表栏 */
        #sidebar {
            width: 350px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: white;
        }
        .controls {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        #fileList {
            overflow-y: auto;
            flex: 1;
        }
        .file-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .file-item:hover { background-color: #f7f7f7; }
        .file-item.active {
            border-right: 4px solid var(--primary-color);
            background-color: #f0f9ff;
        }
        .file-item .time {
            font-size: 0.8rem;
            color: #657786;
            margin-bottom: 4px;
        }
        .file-item .title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 右侧内容栏 */
        #content-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f7f7f7;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #657786;
        }
        #search {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="controls">
        <h3 style="margin-top:0">快照阅读器</h3>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        <input type="text" id="search" placeholder="搜索推文内容...">
    </div>
    <div id="fileList">
        <div class="empty-state">请先选择包含 HTML 的文件夹</div>
    </div>
</div>

<div id="content-viewer">
    <div id="placeholder" class="empty-state">选择左侧推文进行预览</div>
    <iframe id="viewer" style="display:none;"></iframe>
</div>

<script>
    const folderInput = document.getElementById('folderInput');
    const fileListDiv = document.getElementById('fileList');
    const viewer = document.getElementById('viewer');
    const placeholder = document.getElementById('placeholder');
    const searchInput = document.getElementById('search');

    let allFiles = [];

    folderInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith('.html'));
        
        // 解析文件信息
        allFiles = await Promise.all(files.map(async file => {
            const text = await file.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const content = doc.querySelector('.content')?.innerText || "";
            const author = doc.querySelector('.author')?.innerText || "Unknown";
            const date = doc.querySelector('.date')?.innerText || "";
            
            return {
                name: file.name,
                author,
                content,
                date,
                url: URL.createObjectURL(file), // 创建本地预览链接
                rawFile: file
            };
        }));

        // 按时间戳排序（根据文件名中的数字）
        allFiles.sort((a, b) => b.name.localeCompare(a.name));
        
        renderList(allFiles);
    });

    function renderList(list) {
        fileListDiv.innerHTML = '';
        if (list.length === 0) {
            fileListDiv.innerHTML = '<div class="empty-state">未找到 HTML 文件</div>';
            return;
        }

        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <div class="time">${item.date.split('at: ')[1] || item.name}</div>
                <div class="title"><strong>${item.author}</strong>: ${item.content.substring(0, 30)}...</div>
            `;
            div.onclick = () => {
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                placeholder.style.display = 'none';
                viewer.style.display = 'block';
                viewer.src = item.url;
            };
            fileListDiv.appendChild(div);
        });
    }

    // 简单的搜索功能
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allFiles.filter(f => 
            f.content.toLowerCase().includes(term) || 
            f.author.toLowerCase().includes(term)
        );
        renderList(filtered);
    });
</script>

</body>
</html>
